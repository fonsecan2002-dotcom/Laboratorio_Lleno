<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Control de Laboratorio</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #0b0f1a;
      --surface: #111827;
      --surface-2: #1a2235;
      --border: #1e2d45;
      --accent: #00e5ff;
      --accent-dim: #00e5ff22;
      --green: #00e676;
      --green-dim: #00e67622;
      --red: #ff4c6a;
      --red-dim: #ff4c6a22;
      --yellow: #ffd740;
      --yellow-dim: #ffd74022;
      --text: #e8edf5;
      --text-muted: #5a6a85;
      --mono: 'Space Mono', monospace;
      --body: 'DM Sans', sans-serif;
      --radius: 12px;
      --radius-sm: 8px;
      --ease: 0.22s cubic-bezier(0.4,0,0.2,1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--body);
      min-height: 100vh;
      padding: 30px 15px;
      display: flex;
      justify-content: center;

      background-image:
        radial-gradient(ellipse 80% 50% at 50% -10%, #00e5ff0d 0%, transparent 70%),
        repeating-linear-gradient(0deg, transparent, transparent 39px, #ffffff04 39px, #ffffff04 40px),
        repeating-linear-gradient(90deg, transparent, transparent 39px, #ffffff04 39px, #ffffff04 40px);
    }

    .container {
      width: 100%;
      max-width: 600px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .header {
      text-align: center;
      padding: 20px 0;
    }

    .header h1 {
      font-family: var(--mono);
      color: var(--accent);
      font-size: 1.6rem;
      text-transform: uppercase;
      letter-spacing: .1em;
    }

    .header p {
      color: var(--text-muted);
      font-size: .8rem;
      margin-top: 5px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px;
    }

    .card-title {
      font-size: .75rem;
      text-transform: uppercase;
      letter-spacing: .12em;
      color: var(--text-muted);
      margin-bottom: 15px;
      font-family: var(--mono);
    }

    .status-card {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 15px;
    }

    .status-indicator {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 10px var(--green);
    }

    .status-dot.casi {
      background: var(--yellow);
      box-shadow: 0 0 10px var(--yellow);
    }

    .status-dot.lleno {
      background: var(--red);
      box-shadow: 0 0 10px var(--red);
    }

    .status-text {
      font-family: var(--mono);
      font-size: .85rem;
      font-weight: bold;
      color: var(--green);
    }

    .status-text.casi {
      color: var(--yellow);
    }

    .status-text.lleno {
      color: var(--red);
    }

    .cap-fraction {
      font-family: var(--mono);
      font-size: 1.5rem;
    }

    .current {
      color: var(--accent);
    }

    .progress-bar-bg {
      background: var(--border);
      height: 8px;
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent), var(--green));
      transition: .4s;
    }

    .progress-bar-fill.casi {
      background: linear-gradient(90deg, var(--yellow), orange);
    }

    .progress-bar-fill.lleno {
      background: linear-gradient(90deg, var(--red), orange);
    }

    .input-group {
      display: flex;
      gap: 10px;
    }

    .input-field {
      flex: 1;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 15px;
      color: white;
      outline: none;
    }

    .input-field:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }

    .btn {
      border: none;
      cursor: pointer;
      padding: 12px 18px;
      border-radius: var(--radius-sm);
      font-family: var(--mono);
      font-weight: bold;
      transition: .2s;
    }

    .btn-enter {
      background: var(--accent);
      color: black;
    }

    .btn-enter:hover {
      transform: translateY(-1px);
    }

    .btn-enter:disabled {
      opacity: .4;
      cursor: not-allowed;
    }

    .student-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 10px;
    }

    .student-item {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      transition: .2s;
    }

    .student-item:hover {
      border-color: var(--accent);
    }

    .student-item.selected {
      border-color: var(--accent);
      background: var(--accent-dim);
    }

    .student-name {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .student-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--green));
      color: black;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: var(--mono);
      font-weight: bold;
    }

    .student-info {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .student-time {
      font-size: .7rem;
      color: var(--accent);
    }

    .actions-row {
      margin-top: 15px;
      display: flex;
      justify-content: flex-end;
    }

    .btn-remove {
      background: transparent;
      border: 1px solid var(--red);
      color: var(--red);
    }

    .btn-remove:disabled {
      opacity: .4;
      cursor: not-allowed;
    }

    .empty-state {
      text-align: center;
      padding: 30px;
      color: var(--text-muted);
    }

    .log-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    .log-table th,
    .log-table td {
      padding: 10px;
      border-bottom: 1px solid #ffffff10;
      text-align: left;
      font-size: .82rem;
    }

    .badge {
      padding: 3px 8px;
      border-radius: 999px;
      font-size: .65rem;
      font-family: var(--mono);
      font-weight: bold;
    }

    .badge-in {
      background: var(--green-dim);
      color: var(--green);
    }

    .badge-out {
      background: var(--red-dim);
      color: var(--red);
    }

    .toast-container {
      position: fixed;
      top: 20px;
      right: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 999;
    }

    .toast {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 12px 18px;
      border-radius: var(--radius-sm);
      min-width: 220px;
      animation: aparecer .3s ease;
    }

    .toast.success {
      border-left: 4px solid var(--green);
    }

    .toast.error {
      border-left: 4px solid var(--red);
    }

    @keyframes aparecer {
      from {
        opacity: 0;
        transform: translateX(20px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @media (max-width: 480px) {
      .input-group {
        flex-direction: column;
      }

      .status-card {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>

<body>

<div class="toast-container" id="toastContainer"></div>

<div class="container">

  <div class="header">
    <h1>🔬 Control de Laboratorio</h1>
    <p>Sistema de registro de estudiantes</p>
  </div>

  <!-- ESTADO -->
  <div class="card status-card">

    <div class="status-indicator">
      <div class="status-dot" id="statusDot"></div>
      <span class="status-text" id="statusText">DISPONIBLE</span>
    </div>

    <div class="cap-fraction">
      <span class="current" id="currentCount">0</span>
      /
      <span>15</span>
    </div>

  </div>

  <!-- BARRA -->
  <div class="progress-bar-bg">
    <div class="progress-bar-fill" id="progressBar"></div>
  </div>

  <!-- FORMULARIO -->
  <div class="card">

    <div class="card-title">Registrar estudiante</div>

    <div class="input-group">

      <input
        type="text"
        id="inputNombre"
        class="input-field"
        placeholder="Nombre completo..."
      >

      <button
        class="btn btn-enter"
        id="btnIngresar"
        onclick="ingresar()"
      >
        Ingresar
      </button>

    </div>

  </div>

  <!-- LISTA -->
  <div class="card">

    <div class="card-title">
      Estudiantes en el laboratorio
    </div>

    <ul class="student-list" id="studentList"></ul>

    <div class="empty-state" id="emptyState">
      🪑<br><br>
      El laboratorio está vacío
    </div>

    <div class="actions-row">
      <button
        class="btn btn-remove"
        id="btnSalir"
        onclick="salir()"
        disabled
      >
        Retirar estudiante
      </button>
    </div>

  </div>

  <!-- REGISTRO -->
  <div class="card">

    <div class="card-title">
      Registro de entradas y salidas
    </div>

    <table class="log-table">

      <thead>
        <tr>
          <th>#</th>
          <th>Estudiante</th>
          <th>Evento</th>
          <th>Hora</th>
        </tr>
      </thead>

      <tbody id="logBody">
        <tr>
          <td colspan="4">
            Sin eventos registrados
          </td>
        </tr>
      </tbody>

    </table>

  </div>

</div>

<script>

const CAPACIDAD_MAXIMA = 15;
const UMBRAL_CASI_LLENO = 12;

let estudiantes = [];
let logRegistro = [];
let seleccionado = null;
let secuencia = 0;

function ahora() {

  const d = new Date();

  return {
    hora: d.toLocaleTimeString('es-CO')
  };
}

function ingresar() {

  const input = document.getElementById('inputNombre');

  const nombre = input.value.trim();

  // VALIDAR VACÍO
  if (nombre === '') {
    showToast('Escribe un nombre.', 'error');
    return;
  }

  // VALIDAR NOMBRE Y APELLIDO
  const partes = nombre.split(/\s+/);

  if (partes.length < 2) {
    showToast('Ingresa nombre y apellido.', 'error');
    return;
  }

  // VALIDAR LETRAS
  const regex = /^[A-Za-zÁÉÍÓÚáéíóúÑñ\s]+$/;

  if (!regex.test(nombre)) {
    showToast('Solo letras y espacios.', 'error');
    return;
  }

  // FORMATEAR
  const nombreFinal = partes
    .map(p =>
      p.charAt(0).toUpperCase() +
      p.slice(1).toLowerCase()
    )
    .join(' ');

  // LABORATORIO LLENO
  if (estudiantes.length >= CAPACIDAD_MAXIMA) {
    showToast('Laboratorio lleno.', 'error');
    return;
  }

  // DUPLICADO
  if (estudiantes.some(e => e.nombre === nombreFinal)) {
    showToast('Ese estudiante ya está registrado.', 'error');
    return;
  }

  // AGREGAR
  const t = ahora();

  estudiantes.push({
    nombre: nombreFinal,
    horaIngreso: t.hora
  });

  agregarLog(nombreFinal, 'ENTRADA', t.hora);

  input.value = '';

  actualizarUI();

  showToast(`${nombreFinal} ingresó correctamente.`, 'success');
}

function salir() {

  if (!seleccionado) {
    showToast('Selecciona un estudiante.', 'error');
    return;
  }

  estudiantes = estudiantes.filter(
    e => e.nombre !== seleccionado
  );

  agregarLog(seleccionado, 'SALIDA', ahora().hora);

  seleccionado = null;

  actualizarUI();

  showToast('Estudiante retirado.', 'success');
}

function actualizarUI() {

  const cantidad = estudiantes.length;

  document.getElementById('currentCount').textContent = cantidad;

  // ESTADO
  const statusText = document.getElementById('statusText');
  const statusDot = document.getElementById('statusDot');

  statusText.className = 'status-text';
  statusDot.className = 'status-dot';

  if (cantidad >= CAPACIDAD_MAXIMA) {

    statusText.textContent = 'LABORATORIO LLENO';

    statusText.classList.add('lleno');
    statusDot.classList.add('lleno');

  } else if (cantidad >= UMBRAL_CASI_LLENO) {

    statusText.textContent = 'CASI LLENO';

    statusText.classList.add('casi');
    statusDot.classList.add('casi');

  } else {

    statusText.textContent = 'DISPONIBLE';
  }

  // BARRA
  const porcentaje = (cantidad / CAPACIDAD_MAXIMA) * 100;

  const bar = document.getElementById('progressBar');

  bar.style.width = porcentaje + '%';

  bar.className = 'progress-bar-fill';

  if (cantidad >= CAPACIDAD_MAXIMA) {
    bar.classList.add('lleno');
  } else if (cantidad >= UMBRAL_CASI_LLENO) {
    bar.classList.add('casi');
  }

  // BLOQUEAR BOTÓN
  document.getElementById('btnIngresar').disabled =
    cantidad >= CAPACIDAD_MAXIMA;

  renderLista();
}

function renderLista() {

  const lista = document.getElementById('studentList');

  const empty = document.getElementById('emptyState');

  lista.innerHTML = '';

  if (estudiantes.length === 0) {

    empty.style.display = 'block';

    document.getElementById('btnSalir').disabled = true;

    return;
  }

  empty.style.display = 'none';

  estudiantes.forEach((est, i) => {

    const li = document.createElement('li');

    li.className = 'student-item';

    if (seleccionado === est.nombre) {
      li.classList.add('selected');
    }

    const iniciales = est.nombre
      .split(' ')
      .map(p => p[0])
      .slice(0,2)
      .join('');

    li.innerHTML = `
      <div class="student-name">

        <div class="student-avatar">
          ${iniciales}
        </div>

        <div class="student-info">
          <span>${est.nombre}</span>
          <span class="student-time">
            ⏱ ${est.horaIngreso}
          </span>
        </div>

      </div>

      <span>#${String(i + 1).padStart(2,'0')}</span>
    `;

    li.onclick = () => seleccionar(est.nombre);

    lista.appendChild(li);

  });
}

function seleccionar(nombre) {

  if (seleccionado === nombre) {

    seleccionado = null;

    document.getElementById('btnSalir').disabled = true;

  } else {

    seleccionado = nombre;

    document.getElementById('btnSalir').disabled = false;
  }

  renderLista();
}

function agregarLog(nombre, tipo, hora) {

  secuencia++;

  logRegistro.unshift({
    id: secuencia,
    nombre,
    tipo,
    hora
  });

  renderLog();
}

function renderLog() {

  const body = document.getElementById('logBody');

  if (logRegistro.length === 0) {

    body.innerHTML = `
      <tr>
        <td colspan="4">
          Sin eventos registrados
        </td>
      </tr>
    `;

    return;
  }

  body.innerHTML = '';

  logRegistro.forEach(log => {

    const tr = document.createElement('tr');

    tr.innerHTML = `
      <td>${String(log.id).padStart(3,'0')}</td>

      <td>${log.nombre}</td>

      <td>
        <span class="badge ${
          log.tipo === 'ENTRADA'
            ? 'badge-in'
            : 'badge-out'
        }">
          ${log.tipo}
        </span>
      </td>

      <td>${log.hora}</td>
    `;

    body.appendChild(tr);

  });
}

function showToast(msg, type='success') {

  const container =
    document.getElementById('toastContainer');

  const toast = document.createElement('div');

  toast.className = `toast ${type}`;

  toast.textContent = msg;

  container.appendChild(toast);

  setTimeout(() => {
    toast.remove();
  }, 3000);
}

// ENTER
document.addEventListener('DOMContentLoaded', () => {

  document
    .getElementById('inputNombre')
    .addEventListener('keydown', e => {

      if (e.key === 'Enter') {
        ingresar();
      }

    });

});

actualizarUI();

</script>

</body>
</html>
